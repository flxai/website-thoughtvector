<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>𝖙𝖍𝖔𝖚𝖌𝖍𝖙𝖛𝖊𝖈𝖙𝖔𝖗.𝖟𝖎𝖕</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&display=swap" rel="stylesheet">
  <style>
    html,body{margin:0;height:100%;overflow:hidden}
    body{
      position:relative;
      background:#000;
      color:#f4ecda;
      font-family:"Noto Sans Math","STIX Two Math","Cambria Math","UnifrakturCook",serif;
    }
    video{width:100%;height:100%;object-fit:cover}
    .title{
      position:absolute;
      bottom:15rem;
      left:50%;
      transform:translateX(-50%);
      margin:0;
      font-size:8rem;
      line-height:0.95;
      letter-spacing:0.025em;
      white-space:nowrap;
      text-align:center;
      background-image:linear-gradient(
        90deg,
        #f3e35a 0%,
        #ffb22c 18%,
        #ff5d1d 38%,
        #c52b7f 60%,
        #7a39f1 77%,
        #2a68ff 100%
      );
      background-size:220% 100%;
      background-position:0 50%;
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
      filter:drop-shadow(0 0 22px rgba(0,0,0,0.82));
      pointer-events:none;
      z-index:1;
      animation:spectrum-flow 2.8s steps(20, end) infinite,
                title-flicker 1.35s steps(16, end) infinite;
    }
    @keyframes spectrum-flow{
      0%{background-position:0% 50%;filter:drop-shadow(0 0 20px rgba(0,0,0,0.82)) saturate(1.05) brightness(0.95)}
      25%{background-position:32% 50%;filter:drop-shadow(0 0 24px rgba(0,0,0,0.88)) saturate(1.18) brightness(1.05)}
      50%{background-position:100% 50%;filter:drop-shadow(0 0 20px rgba(0,0,0,0.82)) saturate(1.28) brightness(0.98)}
      75%{background-position:58% 50%;filter:drop-shadow(0 0 26px rgba(0,0,0,0.9)) saturate(1.2) brightness(1.08)}
      100%{background-position:0% 50%;filter:drop-shadow(0 0 20px rgba(0,0,0,0.82)) saturate(1.05) brightness(0.95)}
    }
    @keyframes title-flicker{
      0%,100%{opacity:0.96}
      6%{opacity:0.84}
      12%{opacity:1}
      19%{opacity:0.88}
      28%{opacity:0.97}
      36%{opacity:0.8}
      51%{opacity:1}
      63%{opacity:0.9}
      74%{opacity:1}
      83%{opacity:0.86}
      92%{opacity:0.98}
    }
    @media (max-width: 700px){
      .title{
        bottom:6rem;
        font-size:min(2.15rem, 6.3vw);
        letter-spacing:0.015em;
      }
    }
  </style>
</head>
<body>
  <h1 class="title">𝖙𝖍𝖔𝖚𝖌𝖍𝖙𝖛𝖊𝖈𝖙𝖔𝖗.𝖟𝖎𝖕</h1>
  <video src="robot.mp4" autoplay loop muted playsinline></video>
</body>
</html>
