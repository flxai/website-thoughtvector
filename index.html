<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>THOUGHT VECTOR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&display=swap" rel="stylesheet">
  <style>
    html,body{margin:0;height:100%;overflow:hidden}
    body{
      position:relative;
      background:#000;
      color:#f4ecda;
      font-family:"UnifrakturCook", serif;
    }
    video{width:100%;height:100%;object-fit:cover}
    .title{
      position:absolute;
      inset:0 auto auto 50%;
      transform:translateX(-50%);
      margin:0;
      padding-top:clamp(1rem, 4vh, 2.5rem);
      font-size:clamp(2.5rem, 8vw, 6rem);
      letter-spacing:0.08em;
      text-transform:uppercase;
      text-align:center;
      text-shadow:0 0 24px rgba(0,0,0,0.75), 0 0 2px rgba(0,0,0,0.9);
      pointer-events:none;
      z-index:1;
      width:min(90vw, 14ch);
    }
  </style>
</head>
<body>
  <h1 class="title">THOUGHT VECTOR</h1>
  <video src="robot.mp4" autoplay loop muted playsinline></video>
</body>
</html>
